<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Garmin 授權完成</title>
<style>
  body { font-family: system-ui; background: #f0f9f4; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: white; border-radius: 16px; padding: 40px; max-width: 480px;
         text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h1 { color: #1e7a48; margin-bottom: 8px; }
  .url-box { background: #f4f4f0; border: 1px solid #e4e4de; border-radius: 8px;
             padding: 12px; font-family: monospace; font-size: 12px; word-break: break-all;
             margin: 16px 0; text-align: left; }
  .btn { background: #1e7a48; color: white; border: none; border-radius: 8px;
         padding: 12px 24px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #155c36; }
  .step { background: #e8f5ed; border-radius: 8px; padding: 12px 16px; margin-top: 16px;
          font-size: 13px; color: #155c36; text-align: left; }
</style>
</head>
<body>
<div class="box">
  <div style="font-size:48px;margin-bottom:12px">✅</div>
  <h1>Garmin 授權成功！</h1>
  <p style="color:#666;font-size:14px">請將下方完整網址複製，傳回給管理員（Joser）</p>

  <div class="url-box" id="url-display">讀取中...</div>

  <button class="btn" onclick="copyUrl()">📋 複製網址</button>

  <div class="step">
    <strong>接下來：</strong><br>
    1. 點上方按鈕複製網址<br>
    2. 透過 Line 傳給 Joser<br>
    3. Joser 完成設定後，你的數據就會自動同步 🎉
  </div>
</div>

<script>
  const fullUrl = window.location.href;
  document.getElementById('url-display').textContent = fullUrl;

  function copyUrl() {
    navigator.clipboard.writeText(fullUrl).then(() => {
      const btn = document.querySelector('.btn');
      btn.textContent = '✅ 已複製！';
      btn.style.background = '#155c36';
      setTimeout(() => {
        btn.textContent = '📋 複製網址';
        btn.style.background = '#1e7a48';
      }, 2000);
    });
  }
</script>
</body>
</html>
