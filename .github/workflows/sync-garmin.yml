name: 🦶 每日 Garmin 數據同步

on:
  schedule:
    # 每天台灣時間 08:00（UTC 00:00）和 21:00（UTC 13:00）各跑一次
    - cron: '0 0 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許寫入 repo

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests python-dateutil pytz

      - name: 🏃 Fetch Garmin data for all members
        env:
          # 每位成員的 Garmin OAuth tokens（存在 GitHub Secrets）
          GARMIN_TOKEN_KAREN:    ${{ secrets.GARMIN_TOKEN_KAREN }}
          GARMIN_TOKEN_JOSEPH:   ${{ secrets.GARMIN_TOKEN_JOSEPH }}
          GARMIN_TOKEN_JUHUA:    ${{ secrets.GARMIN_TOKEN_JUHUA }}
          GARMIN_TOKEN_CYNTHIA:  ${{ secrets.GARMIN_TOKEN_CYNTHIA }}
          GARMIN_TOKEN_NANA:     ${{ secrets.GARMIN_TOKEN_NANA }}
          GARMIN_TOKEN_JAY:      ${{ secrets.GARMIN_TOKEN_JAY }}
          GARMIN_TOKEN_RAY:      ${{ secrets.GARMIN_TOKEN_RAY }}
        run: python scripts/fetch_garmin.py

      - name: 💾 Commit & push updated data
        run: |
          git config user.name  "health-bot"
          git config user.email "bot@health-community.dev"
          git add data/
          # 只有真的有變更才 commit
          git diff --staged --quiet || git commit -m "📊 Auto-sync Garmin data $(date +'%Y-%m-%d %H:%M') CST"
          git push
